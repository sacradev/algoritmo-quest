<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>Algoritmo Quest - Jornada da Lógica</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .progress-word {
            font-size: 2em;
            letter-spacing: 10px;
            margin: 20px 0;
            font-weight: bold;
        }

        .progress-word span {
            display: inline-block;
            width: 40px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            line-height: 50px;
            margin: 0 5px;
        }

        .progress-word span.unlocked {
            background: #00d4ff;
            color: #000;
            transform: scale(1.1);
        }

        .world-map {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .world-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .world-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: #e0e0e0;
        }

        .world-card.completed {
            background: linear-gradient(135deg, #00c853 0%, #00e676 100%);
            color: white;
        }

        .world-card.current {
            border: 3px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .world-card:not(.locked):hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .world-number {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .world-title {
            font-size: 1em;
            margin-bottom: 5px;
        }

        .world-letter {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-top: 10px;
        }

        .world-card.completed .world-letter {
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 10px;
        }

        .intro-card {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .intro-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .intro-card pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.9em;
        }

        .stage-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stage-item {
            aspect-ratio: 1;
            background: #e0e0e0;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .stage-item.unlocked {
            background: #00d4ff;
            color: white;
        }

        .stage-item.completed {
            background: #00c853;
            color: white;
        }

        .stage-item.boss {
            background: linear-gradient(135deg, #ff5252 0%, #ff1744 100%);
            color: white;
            font-weight: bold;
        }

        .stage-item:not(.locked):hover {
            transform: scale(1.1);
        }

        .stage-item.locked {
            cursor: not-allowed;
            opacity: 0.4;
        }

        .question-area {
            margin: 20px 0;
        }

        .question-text {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .question-context {
            font-style: italic;
            color: #666;
            margin-bottom: 15px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 15px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option:hover {
            border-color: #667eea;
            background: #e8eaf6;
        }

        .option.selected {
            border-color: #00d4ff;
            background: #e1f5fe;
        }

        .option.correct {
            border-color: #00c853;
            background: #e8f5e9;
        }

        .option.incorrect {
            border-color: #ff5252;
            background: #ffebee;
        }

        .fill-blank {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            line-height: 2;
        }

        .fill-blank input {
            font-family: 'Courier New', monospace;
            padding: 5px 10px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 1em;
            width: 150px;
            text-align: center;
        }

        .fill-blank input.correct {
            border-color: #00c853;
            background: #e8f5e9;
        }

        .fill-blank input.incorrect {
            border-color: #ff5252;
            background: #ffebee;
        }

        .hint-text {
            font-size: 0.85em;
            color: #ff5252;
            margin-top: 5px;
        }

        .draggable-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
        }

        .drag-item {
            padding: 15px;
            background: #00d4ff;
            color: white;
            border-radius: 8px;
            cursor: move;
            user-select: none;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .drag-item:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .drag-item.dragging {
            opacity: 0.5;
        }

        .match-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .match-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-item {
            padding: 15px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .match-item.selected {
            border-color: #00d4ff;
            background: #e1f5fe;
        }

        .match-item.matched {
            border-color: #00c853;
            background: #e8f5e9;
            cursor: default;
        }

        .match-item.wrong {
            border-color: #ff5252;
            background: #ffebee;
        }

        .feedback {
            margin: 20px 0;
            padding: 15px;
            border-radius: 10px;
            display: none;
            white-space: pre-line;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            border-left: 4px solid #00c853;
            color: #1b5e20;
        }

        .feedback.incorrect {
            background: #ffebee;
            border-left: 4px solid #ff5252;
            color: #b71c1c;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin: 5px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-success {
            background: #00c853;
            color: white;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .boss-banner {
            background: linear-gradient(135deg, #ff5252 0%, #ff1744 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .world-map {
                grid-template-columns: repeat(2, 1fr);
            }

            header h1 {
                font-size: 1.8em;
            }

            .progress-word {
                font-size: 1.5em;
                letter-spacing: 5px;
            }

            .match-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Algoritmo Quest</h1>
            <p>Domine a lógica de programação jogando!</p>
            <div class="progress-word" id="progressWord"></div>
            <button class="btn btn-secondary" onclick="resetProgress()" style="margin-top: 15px;">🔄 Resetar Progresso</button>
        </header>

        <div class="world-map" id="worldMap"></div>
    </div>

    <div class="modal" id="worldModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const WORLDS = [
            {
                id: 1,
                title: "Variáveis e Tipos",
                letter: "A",
                intro: {
                    title: "Variáveis e Tipos de Dados",
                    description: "Variáveis guardam informações na memória. Cada uma tem um nome e um tipo (texto, número inteiro, número decimal, verdadeiro/falso).",
                    example: `usuario ← "Maria"\nsaldo ← 150.00\nativo ← verdadeiro`
                },
                stages: [
                    {
                        type: "fill",
                        context: "Complete o código criando variáveis de um cadastro de cliente:",
                        template: "nome ← {0}\nidade ← {1}\nfidelidade ← {2}",
                        blanks: [
                            { 
                                validate: (v) => /^["'].*["']$/.test(v) && v.length > 2,
                                placeholder: "texto",
                                errorHint: "Textos devem estar entre aspas! Ex: \"Maria\""
                            },
                            { 
                                validate: (v) => /^\d+$/.test(v),
                                placeholder: "número",
                                errorHint: "Digite apenas números, sem aspas. Ex: 25"
                            },
                            { 
                                validate: (v) => ["verdadeiro", "falso", "true", "false"].includes(v.toLowerCase()),
                                placeholder: "booleano",
                                errorHint: "Use apenas: verdadeiro ou falso"
                            }
                        ],
                        successMessage: "🎉 Parabéns! Cada tipo de dado tem sua forma:\n\n• Strings (textos) vão entre aspas: \"texto\"\n• Números são digitados livremente: 42\n• Booleanos só podem ser: verdadeiro ou falso"
                    },
                    {
                        type: "multiple",
                        context: "Analise o código:",
                        code: "a ← 5\nb ← a\na ← 10",
                        question: "Qual o valor de 'b' no final?",
                        options: ["5", "10", "15", "Erro"],
                        correct: 0,
                        explanation: "Quando 'b' recebeu 'a', o valor de 'a' era 5. Alterar 'a' depois não muda 'b'.",
                        successMessage: "🎉 Exato! Variáveis guardam valores, não referências. Quando você faz b ← a, o valor é copiado."
                    },
                    {
                        type: "drag",
                        context: "Um sistema precisa criar variáveis para um restaurante. Ordene as linhas de forma lógica:",
                        question: "Arraste para ordenar (nome → nota → status):",
                        items: [
                            'nome ← "Pizzaria Bella"',
                            'nota ← 4.5',
                            'aberto ← verdadeiro'
                        ],
                        correctOrder: [0, 1, 2],
                        successMessage: "🎉 Muito bem! Organizar variáveis de forma lógica facilita a leitura do código."
                    },
                    {
                        type: "match",
                        context: "Cada tipo de dado tem exemplos específicos:",
                        question: "Associe o tipo com o valor correspondente:",
                        pairs: [
                            { left: "Inteiro", right: "42" },
                            { left: "Real", right: "3.14" },
                            { left: "Texto", right: '"Olá"' },
                            { left: "Booleano", right: "verdadeiro" }
                        ],
                        successMessage: "🎉 Perfeito! Reconhecer tipos de dados é essencial:\n\n• Inteiro: números sem decimal\n• Real: números com decimal\n• Texto: sempre entre aspas\n• Booleano: verdadeiro/falso"
                    },
                    {
                        type: "fill",
                        context: "Complete as variáveis para um sistema de academia:",
                        template: "aluno ← {0}\npeso ← {1}\naltura ← {2}\nativo ← {3}",
                        blanks: [
                            { 
                                validate: (v) => /^["'].*["']$/.test(v) && v.length > 2,
                                placeholder: "texto",
                                errorHint: "Nome do aluno entre aspas!"
                            },
                            { 
                                validate: (v) => /^\d+(\.\d+)?$/.test(v),
                                placeholder: "número",
                                errorHint: "Peso em kg (número). Ex: 75 ou 75.5"
                            },
                            { 
                                validate: (v) => /^\d+\.\d+$/.test(v),
                                placeholder: "decimal",
                                errorHint: "Altura em metros (decimal). Ex: 1.75"
                            },
                            { 
                                validate: (v) => ["verdadeiro", "falso", "true", "false"].includes(v.toLowerCase()),
                                placeholder: "booleano",
                                errorHint: "Status: verdadeiro ou falso"
                            }
                        ],
                        successMessage: "🎉 Excelente! Você dominou os tipos de dados:\n\n• Texto (string): \"nome\"\n• Número inteiro: 75\n• Número decimal: 1.75\n• Booleano: verdadeiro/falso\n\nPronto para o Boss!"
                    }
                ]
            },
            {
                id: 2,
                title: "Entrada e Saída",
                letter: "L",
                intro: {
                    title: "Entrada e Saída de Dados",
                    description: "Programas precisam receber dados do usuário (entrada) e mostrar resultados (saída).",
                    example: `nome ← ler()\nescrever("Olá, " + nome)`
                },
                stages: []
            },
            {
                id: 3,
                title: "Operadores",
                letter: "G",
                intro: {
                    title: "Operadores",
                    description: "Operadores permitem fazer cálculos, comparações e combinações lógicas.",
                    example: `soma ← 5 + 3\nmaior ← (a > b)\nambos ← (x E y)`
                },
                stages: []
            },
            {
                id: 4,
                title: "Decisão (if/else)",
                letter: "O",
                intro: {
                    title: "Estruturas de Decisão",
                    description: "Permitem que o programa tome caminhos diferentes baseado em condições.",
                    example: `SE idade >= 18 ENTÃO\n    escrever("Maior de idade")\nSENÃO\n    escrever("Menor de idade")`
                },
                stages: []
            },
            {
                id: 5,
                title: "Decisão Múltipla",
                letter: "R",
                intro: {
                    title: "Decisão Múltipla",
                    description: "Quando há várias opções possíveis, usamos estruturas de múltipla escolha.",
                    example: `ESCOLHA opcao\n    CASO 1: escrever("Um")\n    CASO 2: escrever("Dois")\n    SENÃO: escrever("Outro")`
                },
                stages: []
            },
            {
                id: 6,
                title: "Repetição (for)",
                letter: "I",
                intro: {
                    title: "Repetição com Contador",
                    description: "Quando sabemos quantas vezes repetir, usamos o laço PARA.",
                    example: `PARA i DE 1 ATÉ 10 FAÇA\n    escrever(i)\nFIM-PARA`
                },
                stages: []
            },
            {
                id: 7,
                title: "Repetição (while)",
                letter: "T",
                intro: {
                    title: "Repetição Condicional",
                    description: "Quando não sabemos quantas vezes repetir, usamos ENQUANTO.",
                    example: `ENQUANTO saldo > 0 FAÇA\n    saldo ← saldo - 10\nFIM-ENQUANTO`
                },
                stages: []
            },
            {
                id: 8,
                title: "Listas/Vetores",
                letter: "M",
                intro: {
                    title: "Listas e Vetores",
                    description: "Armazenam múltiplos valores em uma única variável.",
                    example: `notas ← [7.5, 8.0, 9.5]\nescrever(notas[0])  // 7.5`
                },
                stages: []
            },
            {
                id: 9,
                title: "Funções",
                letter: "O",
                intro: {
                    title: "Funções",
                    description: "Blocos de código reutilizáveis que executam tarefas específicas.",
                    example: `FUNÇÃO soma(a, b)\n    RETORNAR a + b\nFIM-FUNÇÃO\n\nresultado ← soma(5, 3)`
                },
                stages: []
            }
        ];

        let gameState = {
            currentWorld: 1,
            completedWorlds: [],
            completedStages: {},
            unlockedLetters: []
        };

        let currentStageData = null;
        let selectedOption = null;
        let draggedElement = null;
        let matchSelections = { left: null, right: null };
        let matchedPairs = [];

        function loadProgress() {
            const saved = localStorage.getItem('algoritmoQuestProgress');
            if (saved) {
                gameState = JSON.parse(saved);
            }
        }

        function saveProgress() {
            localStorage.setItem('algoritmoQuestProgress', JSON.stringify(gameState));
        }

        function resetProgress() {
            if (confirm('Tem certeza? Todo o progresso será perdido!')) {
                localStorage.removeItem('algoritmoQuestProgress');
                location.reload();
            }
        }

        function renderProgressWord() {
            const word = "ALGORITMO";
            const html = word.split('').map((letter, i) => {
                const unlocked = gameState.unlockedLetters.includes(i);
                return `<span class="${unlocked ? 'unlocked' : ''}">${unlocked ? letter : '?'}</span>`;
            }).join('');
            document.getElementById('progressWord').innerHTML = html;
        }

        function renderWorldMap() {
            const mapHtml = WORLDS.map((world, index) => {
                const isLocked = index > 0 && !gameState.completedWorlds.includes(index);
                const isCompleted = gameState.completedWorlds.includes(index + 1);
                const isCurrent = !isCompleted && (index === 0 || gameState.completedWorlds.includes(index));
                
                return `
                    <div class="world-card ${isLocked ? 'locked' : ''} ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''}"
                         onclick="${isLocked ? '' : `openWorld(${world.id})`}">
                        <div class="world-number">Mundo ${world.id}</div>
                        <div class="world-title">${world.title}</div>
                        <div class="world-letter">${world.letter}</div>
                        ${isCompleted ? '<div>✅ Completo</div>' : ''}
                    </div>
                `;
            }).join('');
            
            document.getElementById('worldMap').innerHTML = mapHtml;
        }

        function openWorld(worldId) {
            const world = WORLDS.find(w => w.id === worldId);
            if (!world) return;

            let bodyHtml = '';

            if (world.intro) {
                bodyHtml = `
                    <div class="intro-card">
                        <h3>${world.intro.title}</h3>
                        <p>${world.intro.description}</p>
                        <pre>${world.intro.example}</pre>
                    </div>
                `;
            }

            if (world.stages && world.stages.length > 0) {
                bodyHtml += '<h3>Casas do Mundo:</h3>';
                bodyHtml += '<div class="stage-grid">';
                
                const completedKey = `world${worldId}`;
                const completed = gameState.completedStages[completedKey] || [];
                
                world.stages.forEach((stage, i) => {
                    const isCompleted = completed.includes(i);
                    const isLocked = i > 0 && !completed.includes(i - 1);
                    
                    bodyHtml += `
                        <div class="stage-item ${isLocked ? 'locked' : 'unlocked'} ${isCompleted ? 'completed' : ''}" 
                             onclick="${isLocked ? '' : `openStage(${worldId}, ${i})`}">
                            <div style="font-size: 1.5em;">${isCompleted ? '✅' : '🏠'}</div>
                            <div>${i + 1}</div>
                        </div>
                    `;
                });

                const allCompleted = completed.length === world.stages.length;
                bodyHtml += `
                    <div class="stage-item boss ${allCompleted ? '' : 'locked'}" 
                         onclick="${allCompleted ? `openBoss(${worldId})` : ''}">
                        <div style="font-size: 1.5em;">👑</div>
                        <div>BOSS</div>
                    </div>
                `;
                bodyHtml += '</div>';
            } else {
                bodyHtml += '<p style="text-align:center; color:#999; margin: 20px 0;">🚧 Em construção...</p>';
            }

            bodyHtml += `
                <div class="action-buttons">
                    <button class="btn btn-secondary" onclick="closeModal()">Voltar ao Mapa</button>
                </div>
            `;

            document.getElementById('modalTitle').textContent = `Mundo ${worldId}: ${world.title}`;
            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('worldModal').classList.add('show');
        }

        function openStage(worldId, stageId) {
            const world = WORLDS.find(w => w.id === worldId);
            const stage = world.stages[stageId];
            currentStageData = { worldId, stageId, stage };
            selectedOption = null;
            matchSelections = { left: null, right: null };
            matchedPairs = [];

            let bodyHtml = `
                <div class="question-area">
                    ${stage.context ? `<div class="question-context">${stage.context}</div>` : ''}
                    ${stage.code ? `<pre>${stage.code}</pre>` : ''}
                    ${stage.question ? `<div class="question-text">${stage.question}</div>` : ''}
            `;

            if (stage.type === 'multiple') {
                bodyHtml += '<div class="options">';
                stage.options.forEach((opt, i) => {
                    bodyHtml += `
                        <div class="option" onclick="selectOption(${i})">
                            ${String.fromCharCode(65 + i)}) ${opt}
                        </div>
                    `;
                });
                bodyHtml += '</div>';

            } else if (stage.type === 'fill') {
                let template = stage.template.replace(/\n/g, '<br>');
                stage.blanks.forEach((blank, i) => {
                    template = template.replace(`{${i}}`, 
                        `<input type="text" id="blank${i}" placeholder="${blank.placeholder}" />`);
                });
                bodyHtml += `<div class="fill-blank">${template}</div>`;
                bodyHtml += `<div id="hintsArea"></div>`;

            } else if (stage.type === 'drag') {
                bodyHtml += '<div class="draggable-area" id="dragArea">';
                const shuffled = [...stage.items].sort(() => Math.random() - 0.5);
                shuffled.forEach((item, i) => {
                    bodyHtml += `
                        <div class="drag-item" draggable="true" data-index="${stage.items.indexOf(item)}">
                            ${item}
                        </div>
                    `;
                });
                bodyHtml += '</div>';

            } else if (stage.type === 'match') {
                bodyHtml += '<div class="match-container">';
                bodyHtml += '<div class="match-column" id="matchLeft">';
                stage.pairs.forEach((pair, i) => {
                    bodyHtml += `
                        <div class="match-item" data-index="${i}" onclick="selectMatch('left', ${i}, this)">
                            ${pair.left}
                        </div>
                    `;
                });
                bodyHtml += '</div><div class="match-column" id="matchRight">';
                const shuffledRight = [...stage.pairs].sort(() => Math.random() - 0.5);
                shuffledRight.forEach((pair) => {
                    const originalIndex = stage.pairs.findIndex(p => p.right === pair.right);
                    bodyHtml += `
                        <div class="match-item" data-index="${originalIndex}" onclick="selectMatch('right', ${originalIndex}, this)">
                            ${pair.right}
                        </div>
                    `;
                });
                bodyHtml += '</div></div>';
            }

            bodyHtml += `
                    <div id="feedback" class="feedback"></div>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="checkStageAnswer()">Verificar</button>
                        <button class="btn btn-secondary" onclick="openWorld(${worldId})">Voltar</button>
                    </div>
                </div>
            `;

            document.getElementById('modalTitle').textContent = `Casa ${stageId + 1}`;
            document.getElementById('modalBody').innerHTML = bodyHtml;

            if (stage.type === 'drag') {
                setupDragAndDrop();
            }
        }

        function selectOption(index) {
            selectedOption = index;
            document.querySelectorAll('.option').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
        }

        function setupDragAndDrop() {
            const container = document.getElementById('dragArea');
            const items = container.querySelectorAll('.drag-item');

            items.forEach(item => {
                item.addEventListener('dragstart', (e) => {
                    draggedElement = item;
                    item.classList.add('dragging');
                });

                item.addEventListener('dragend', () => {
                    item.classList.remove('dragging');
                    draggedElement = null;
                });
            });

            container.addEventListener('dragover', (e) => {
                e.preventDefault();
                const afterElement = getDragAfterElement(container, e.clientY);
                if (draggedElement) {
                    if (afterElement == null) {
                        container.appendChild(draggedElement);
                    } else {
                        container.insertBefore(draggedElement, afterElement);
                    }
                }
            });
        }

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.drag-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function selectMatch(side, index, element) {
            if (matchedPairs.includes(index) && side === 'left') return;
            if (matchedPairs.some(p => p === index) && side === 'right') return;

            const column = side === 'left' ? 'matchLeft' : 'matchRight';
            document.querySelectorAll(`#${column} .match-item`).forEach(el => {
                if (!el.classList.contains('matched')) {
                    el.classList.remove('selected');
                }
            });

            element.classList.add('selected');
            matchSelections[side] = index;

            if (matchSelections.left !== null && matchSelections.right !== null) {
                checkMatchPair();
            }
        }

        function checkMatchPair() {
            const leftEl = document.querySelector(`#matchLeft .match-item[data-index="${matchSelections.left}"]`);
            const rightEl = document.querySelector(`#matchRight .match-item[data-index="${matchSelections.right}"]`);

            if (matchSelections.left === matchSelections.right) {
                matchedPairs.push(matchSelections.left);
                leftEl.classList.remove('selected');
                leftEl.classList.add('matched');
                rightEl.classList.remove('selected');
                rightEl.classList.add('matched');
            } else {
                leftEl.classList.add('wrong');
                rightEl.classList.add('wrong');
                setTimeout(() => {
                    leftEl.classList.remove('selected', 'wrong');
                    rightEl.classList.remove('selected', 'wrong');
                }, 800);
            }

            matchSelections = { left: null, right: null };
        }

        function checkStageAnswer() {
            const { worldId, stageId, stage } = currentStageData;
            const feedback = document.getElementById('feedback');
            let isCorrect = false;

           if (stage.type === 'multiple') {
    if (selectedOption === null) {
        alert('Selecione uma resposta!');
        return;
    }
    isCorrect = selectedOption === stage.correct;
    
    document.querySelectorAll('.option').forEach((el, i) => {
        el.classList.remove('selected', 'incorrect');
        if (isCorrect && i === stage.correct) {
            el.classList.add('correct');
            el.style.pointerEvents = 'none';
        }
        if (!isCorrect && i === selectedOption) {
            el.classList.add('incorrect');
        }
    });

    feedback.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
    feedback.textContent = isCorrect 
        ? (stage.successMessage || '✅ Correto!') 
        : `❌ Incorreto. ${stage.explanation || ''}\n\nTente novamente!`;
    
    if (!isCorrect) {
        selectedOption = null;
        return;
    } else if (stage.type === 'fill') {
                const results = [];
                const hintsArea = document.getElementById('hintsArea');
                hintsArea.innerHTML = '';

                stage.blanks.forEach((blank, i) => {
                    const input = document.getElementById(`blank${i}`);
                    const value = input.value.trim();
                    
                    let correct = false;
                    if (blank.validate) {
                        correct = blank.validate(value);
                    } else if (blank.answer) {
                        correct = blank.answer.some(ans => ans.toLowerCase() === value.toLowerCase());
                    }

                    results.push(correct);
                    input.classList.remove('correct', 'incorrect');
                    input.classList.add(correct ? 'correct' : 'incorrect');

                    if (!correct && blank.errorHint) {
                        hintsArea.innerHTML += `<p class="hint-text">⚠️ Campo ${i + 1}: ${blank.errorHint}</p>`;
                    }
                });
                
                isCorrect = results.every(r => r);
                feedback.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
                feedback.textContent = isCorrect 
                    ? (stage.successMessage || '✅ Todas corretas!') 
                    : '❌ Corrija os campos destacados em vermelho.';

            } else if (stage.type === 'drag') {
                const items = Array.from(document.querySelectorAll('.drag-item'));
                const currentOrder = items.map(item => parseInt(item.dataset.index));
                isCorrect = JSON.stringify(currentOrder) === JSON.stringify(stage.correctOrder);
                
                feedback.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
                feedback.textContent = isCorrect 
                    ? (stage.successMessage || '✅ Ordem correta!') 
                    : '❌ Ordem incorreta. Arraste para reorganizar.';

            } else if (stage.type === 'match') {
                isCorrect = matchedPairs.length === stage.pairs.length;
                feedback.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
                feedback.textContent = isCorrect 
                    ? (stage.successMessage || '✅ Todos os pares corretos!') 
                    : `❌ Faltam ${stage.pairs.length - matchedPairs.length} par(es). Continue associando!`;
            }

            if (isCorrect) {
                const completedKey = `world${worldId}`;
                if (!gameState.completedStages[completedKey]) {
                    gameState.completedStages[completedKey] = [];
                }
                if (!gameState.completedStages[completedKey].includes(stageId)) {
                    gameState.completedStages[completedKey].push(stageId);
                }
                saveProgress();
                
                setTimeout(() => {
                    const world = WORLDS.find(w => w.id === worldId);
                    if (stageId < world.stages.length - 1) {
                        openStage(worldId, stageId + 1);
                    } else {
                        openWorld(worldId);
                    }
                }, 2500);
            }
        }

        function openBoss(worldId) {
            const world = WORLDS.find(w => w.id === worldId);
            const bodyHtml = `
                <div class="boss-banner">👑 BOSS DO MUNDO ${worldId} 👑</div>
                <p style="text-align:center; margin:20px 0;">
                    Você completou todas as casas!<br><br>
                    Enfrente o Boss para conquistar a letra <strong style="font-size:1.5em; color:#667eea;">${world.letter}</strong>
                </p>
                <div class="action-buttons">
                    <button class="btn btn-success" onclick="completeBoss(${worldId})">⚔️ Enfrentar Boss</button>
                    <button class="btn btn-secondary" onclick="openWorld(${worldId})">Voltar</button>
                </div>
            `;

            document.getElementById('modalTitle').textContent = `Boss - ${world.title}`;
            document.getElementById('modalBody').innerHTML = bodyHtml;
        }

        function completeBoss(worldId) {
            const world = WORLDS.find(w => w.id === worldId);
            
            if (!gameState.completedWorlds.includes(worldId)) {
                gameState.completedWorlds.push(worldId);
                gameState.unlockedLetters.push(worldId - 1);
                saveProgress();
            }
            
            closeModal();
            renderProgressWord();
            renderWorldMap();
            
            setTimeout(() => {
                alert(`🎉 PARABÉNS!\n\nVocê conquistou a letra "${world.letter}"!\n\nContinue sua jornada para completar: ALGORITMO`);
            }, 300);
        }

        function closeModal() {
            document.getElementById('worldModal').classList.remove('show');
            selectedOption = null;
            matchSelections = { left: null, right: null };
            matchedPairs = [];
            currentStageData = null;
        }

        // Inicialização
        loadProgress();
        renderProgressWord();
        renderWorldMap();
    </script>
</body>
</html>
