<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmo Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* HOME */
        .home-container {
            max-width: 450px;
            margin: 0 auto;
        }

        .home-header {
            text-align: center;
            color: white;
            margin-bottom: 25px;
        }

        .home-header h1 {
            font-size: 1.9em;
            margin-bottom: 5px;
        }

        .home-progress-word {
            font-size: 1.6em;
            letter-spacing: 5px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 4px;
        }

        .home-progress-word span {
            width: 34px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .home-progress-word span.unlocked {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
            box-shadow: 0 0 15px rgba(0,212,255,0.5);
        }

        .worlds-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 25px 0;
        }

        /* Planeta */
.planet {
    aspect-ratio: 1;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    background: transparent;
}

.planet:hover:not(.locked) {
    transform: scale(1.15);
}

/* Emoji = O planeta em si */
.planet-icon {
    font-size: 7em !important;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    filter: drop-shadow(0 0 15px rgba(255,255,255,0.5));
    z-index: 1;
}

/* Letra centralizada sobre o emoji */
.planet-letter {
    font-size: 2em !important;
    font-weight: bold;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.9), 0 0 15px rgba(0,0,0,0.7);
    z-index: 2;
    position: relative;
    margin-top: 15px;
}

.planet-number {
    font-size: 0.7em !important;
    color: white;
    text-align: center;
    line-height: 1.2;
    width: 80px;
    word-wrap: break-word;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.7);
    z-index: 2;
    position: relative;
}

/* Locked - esmaecido */
.planet.locked {
    opacity: 0.3;
    cursor: not-allowed;
    filter: grayscale(0.7);
}

.planet.locked:hover {
    transform: none;
}

/* Completed - brilho verde */
.planet.completed .planet-icon {
    filter: drop-shadow(0 0 20px rgba(0, 200, 83, 0.7));
}

.planet.completed::after {
    content: '✓';
    position: absolute;
    top: 0px;
    right: 5px;
    width: 22px;
    height: 22px;
    background: #00c853;
    border-radius: 50%;
    font-size: 0.7em;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
    z-index: 3;
}

/* Current - pulsando */
.planet.current .planet-icon {
    animation: planetGlow 2s ease-in-out infinite;
}

@keyframes planetGlow {
    0%, 100% { filter: drop-shadow(0 0 15px rgba(255,255,255,0.5)); }
    50% { filter: drop-shadow(0 0 30px rgba(255,255,255,0.9)); }
}

/* Remove backgrounds coloridos antigos */
.planet.world-1, .planet.world-2, .planet.world-3,
.planet.world-4, .planet.world-5, .planet.world-6,
.planet.world-7, .planet.world-8, .planet.world-9 {
    background: transparent !important;
    box-shadow: none !important;
}

        .reset-container { text-align: center; margin-top: 25px; }
        .btn-reset {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-reset:hover { background: rgba(255,82,82,0.3); border-color: #ff5252; color: white; }

        /* MAP VIEW */
        .map-view { display: none; }
        .map-view.active { display: block; }

        .container { max-width: 400px; margin: 0 auto; }

        header { text-align: center; color: white; margin-bottom: 20px; }
        header h1 { font-size: 1.6em; margin-bottom: 5px; }

        .progress-word {
            font-size: 1.4em;
            letter-spacing: 4px;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            gap: 3px;
        }

        .progress-word span {
            width: 30px;
            height: 38px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .progress-word span.unlocked {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
        }

        .map-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px;
        }

        .path-line { width: 4px; height: 45px; background: rgba(255,255,255,0.3); }
        .path-line.dark { background: rgba(255,100,100,0.4); }
        .path-line.boss { background: linear-gradient(180deg, #ffd700, #ff6b4a); height: 60px; }

        .stage {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .stage:hover:not(.locked) { transform: scale(1.1); }
        .stage-icon { font-size: 1.6em; margin-bottom: 2px; }
        .stage-num { font-weight: bold; font-size: 0.9em; }

        .stage.light { background: linear-gradient(135deg, #00d4ff, #0099cc); color: white; border: 3px solid #00e5ff; }
        .stage.light.completed { background: linear-gradient(135deg, #00c853, #00e676); border-color: #69f0ae; }
        .stage.light.locked { background: linear-gradient(135deg, #546e7a, #37474f); border-color: #78909c; opacity: 0.5; cursor: not-allowed; }

        .stage.dark { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; border: 3px solid #ff6b6b; }
        .stage.dark.completed { background: linear-gradient(135deg, #00c853, #00e676); border-color: #69f0ae; }
        .stage.dark.locked { background: linear-gradient(135deg, #4a1a1a, #2d1a1a); border-color: #6b3a3a; opacity: 0.5; cursor: not-allowed; }

        .stage.boss { width: 100px; height: 100px; background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; border: 4px solid #ffea00; }
        .stage.boss.locked { background: linear-gradient(135deg, #5d4e37, #3d3327); border-color: #7d6e57; opacity: 0.5; cursor: not-allowed; }
        .stage.boss .stage-icon { font-size: 2em; }

        .stage.completed::after {
            content: '✓';
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            background: #00c853;
            border-radius: 50%;
            font-size: 0.75em;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .dark-side-divider {
            width: 100%;
            max-width: 250px;
            padding: 10px 15px;
            margin: 12px 0;
            background: linear-gradient(90deg, transparent, #ff416c, #ff4b2b, #ff416c, transparent);
            border-radius: 8px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: darkPulse 3s infinite;
        }
        .dark-side-divider::before, .dark-side-divider::after { content: '⚡'; margin: 0 6px; }
        @keyframes darkPulse { 0%, 100% { box-shadow: 0 0 20px rgba(255,65,108,0.5); } 50% { box-shadow: 0 0 40px rgba(255,65,108,0.8); } }

        .start-badge {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .progress-indicator {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 8px 18px;
            border-radius: 20px;
            color: white;
            font-size: 0.8em;
            z-index: 100;
        }

        code { background: #e8e8e8; padding: 2px 5px; border-radius: 3px; font-family: 'Courier New', monospace; color: #d63384; font-size: 0.85em; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .modal.show { display: flex; }

        .modal-content {
            background: white;
            border-radius: 18px;
            padding: 22px;
            max-width: 480px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .modal-content.dark-mode { background: linear-gradient(135deg, #1a1a2e, #2d1a3e); color: white; border: 2px solid #ff416c; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

        .modal-close { position: absolute; top: 12px; right: 15px; font-size: 1.3em; cursor: pointer; color: #999; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .modal-close:hover { background: #fee; color: #ff416c; }
        .modal-content.dark-mode .modal-close { color: #ff6b6b; }

        .modal-header { text-align: center; margin-bottom: 18px; }
        .modal-header h2 { color: #667eea; font-size: 1.3em; margin-bottom: 4px; }
        .modal-content.dark-mode .modal-header h2 { color: #ff6b6b; }
        .modal-header .subtitle { color: #666; font-size: 0.85em; }
        .modal-content.dark-mode .modal-header .subtitle { color: #aaa; }

        .intro-card { background: linear-gradient(135deg, #f8f9ff, #e8ecff); padding: 18px; border-radius: 10px; margin-bottom: 18px; border-left: 4px solid #667eea; }
        .intro-card h3 { color: #667eea; margin-bottom: 8px; font-size: 1em; }
        .intro-card p { line-height: 1.5; color: #444; font-size: 0.9em; margin-bottom: 10px; }
        .intro-card pre { background: #1a1a2e; color: #f8f8f2; padding: 12px; border-radius: 8px; font-size: 0.8em; line-height: 1.4; white-space: pre-wrap; overflow-x: auto; }

        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 8px 10px; background: #f5f5f5; border-radius: 6px; }
        .modal-content.dark-mode .question-header { background: rgba(255,255,255,0.1); }
        .question-type { background: #667eea; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
        .modal-content.dark-mode .question-type { background: #ff416c; }
        .attempt-counter { color: #666; font-size: 0.8em; }
        .modal-content.dark-mode .attempt-counter { color: #aaa; }

        .question-context { color: #444; margin-bottom: 12px; padding: 12px; background: linear-gradient(135deg, #fff9e6, #fff3cd); border-radius: 8px; border-left: 3px solid #ffc107; line-height: 1.4; font-size: 0.9em; }
        .modal-content.dark-mode .question-context { background: rgba(255,193,7,0.15); color: #ffd54f; border-color: #ff9800; }

        .question-code { background: #1a1a2e; color: #f8f8f2; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-family: 'Courier New', monospace; line-height: 1.5; font-size: 0.85em; white-space: pre-wrap; }

        .question-text { font-size: 0.95em; line-height: 1.4; margin-bottom: 12px; padding: 12px; background: linear-gradient(135deg, #f0f4ff, #e4e9ff); border-radius: 8px; border: 2px solid #667eea; }
        .modal-content.dark-mode .question-text { background: rgba(255,65,108,0.1); border-color: #ff416c; }

        .options { display: flex; flex-direction: column; gap: 8px; }
        .option { padding: 12px 14px; background: white; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .modal-content.dark-mode .option { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
        .option-letter { width: 28px; height: 28px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #667eea; font-size: 0.85em; }
        .modal-content.dark-mode .option-letter { background: rgba(255,65,108,0.3); color: white; }
        .option:hover:not(.disabled) { border-color: #667eea; background: #f8f9ff; }
        .option.selected { border-color: #00d4ff; background: #e6f9ff; }
        .option.selected .option-letter { background: #00d4ff; color: white; }
        .option.correct { border-color: #00c853; background: #e8f5e9; }
        .option.correct .option-letter { background: #00c853; color: white; }
        .option.incorrect { border-color: #ff5252; background: #ffebee; }
        .option.disabled { pointer-events: none; }

        .fill-blank { background: #1a1a2e; color: #f8f8f2; padding: 18px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 0.85em; line-height: 2; white-space: pre-wrap; }
        .fill-blank input { font-family: 'Courier New', monospace; padding: 5px 8px; border: 2px solid #00d4ff; border-radius: 4px; font-size: 0.85em; width: 110px; text-align: center; background: rgba(255,255,255,0.95); }
        .fill-blank input:focus { outline: none; box-shadow: 0 0 0 2px rgba(0,212,255,0.3); }
        .fill-blank input.correct { border-color: #00c853; background: #c8e6c9; }
        .fill-blank input.incorrect { border-color: #ff5252; background: #ffcdd2; }

        .draggable-area { display: flex; flex-direction: column; gap: 6px; padding: 12px; background: #f5f5f5; border-radius: 10px; border: 2px dashed #ccc; min-height: 150px; }
        .modal-content.dark-mode .draggable-area { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }
        .drag-item { padding: 12px 14px; background: linear-gradient(135deg, #667eea, #5a67d8); color: white; border-radius: 6px; cursor: grab; font-family: 'Courier New', monospace; font-size: 0.85em; display: flex; align-items: center; gap: 8px; }
        .modal-content.dark-mode .drag-item { background: linear-gradient(135deg, #ff416c, #ff4b2b); }
        .drag-item::before { content: '⋮⋮'; opacity: 0.6; }
        .drag-item.dragging { opacity: 0.5; }

        .match-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .match-column { display: flex; flex-direction: column; gap: 6px; }
        .match-column-title { text-align: center; font-weight: 600; color: #667eea; margin-bottom: 4px; padding: 5px; background: #f0f4ff; border-radius: 5px; font-size: 0.8em; }
        .modal-content.dark-mode .match-column-title { background: rgba(255,65,108,0.2); color: #ff6b6b; }
        .match-item { padding: 10px 12px; background: white; border: 2px solid #e0e0e0; border-radius: 6px; cursor: pointer; text-align: center; font-family: 'Courier New', monospace; font-size: 0.85em; transition: all 0.2s; }
        .modal-content.dark-mode .match-item { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
        .match-item:hover:not(.matched) { border-color: #667eea; }
        .match-item.selected { border-color: #00d4ff; background: #e6f9ff; transform: scale(1.02); }
        .match-item.matched { border-color: #00c853; background: #e8f5e9; cursor: default; }
        .match-item.wrong { border-color: #ff5252; background: #ffebee; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        .feedback { margin: 15px 0; padding: 12px; border-radius: 8px; display: none; line-height: 1.5; font-size: 0.9em; }
        .feedback.show { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .feedback.correct { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); border-left: 4px solid #00c853; color: #1b5e20; }
        .feedback.incorrect { background: linear-gradient(135deg, #ffebee, #ffcdd2); border-left: 4px solid #ff5252; color: #b71c1c; }
        .modal-content.dark-mode .feedback.incorrect { background: rgba(255,82,82,0.2); color: #ff8a80; }

        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #5a67d8); color: white; }
        .btn-success { background: linear-gradient(135deg, #00c853, #00e676); color: white; }
        .btn-secondary { background: #e0e0e0; color: #333; }
        .btn-danger { background: linear-gradient(135deg, #ff5252, #ff1744); color: white; }
        .action-buttons { display: flex; gap: 8px; margin-top: 18px; justify-content: center; flex-wrap: wrap; }

        .boss-banner { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; padding: 18px; border-radius: 10px; text-align: center; margin-bottom: 18px; }
        .boss-banner h2 { font-size: 1.2em; margin-bottom: 6px; }
        .boss-banner p { opacity: 0.9; font-size: 0.85em; }
        .boss-progress { background: rgba(255,255,255,0.2); border-radius: 12px; padding: 10px 12px; margin: 12px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; }
        .boss-progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.3); border-radius: 3px; margin: 0 10px; overflow: hidden; }
        .boss-progress-fill { height: 100%; background: white; transition: width 0.3s; }

        .results-card { text-align: center; }
        .results-score { font-size: 3em; font-weight: bold; margin: 12px 0; }
        .results-score.pass { color: #00c853; }
        .results-score.fail { color: #ff5252; }
        .results-details { text-align: left; margin: 18px 0; max-height: 280px; overflow-y: auto; }
        .result-item { padding: 10px; margin-bottom: 6px; border-radius: 6px; border-left: 3px solid; font-size: 0.85em; }
        .result-item.correct { background: #e8f5e9; border-color: #00c853; }
        .result-item.incorrect { background: #ffebee; border-color: #ff5252; }
        .result-item .explanation { font-size: 0.85em; color: #555; margin-top: 5px; }

        /* TRANSIÇÕES */
        .dark-transition, .boss-transition, .victory-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 3000;
        }
        .dark-transition.show, .boss-transition.show, .victory-overlay.show { display: flex; }

        .dark-transition { background: radial-gradient(circle, #1a0a0a, #000); }
        .dark-transition .skull { font-size: 6em; animation: skullAppear 1.2s ease forwards; filter: drop-shadow(0 0 25px #ff416c); }
        @keyframes skullAppear { 0% { transform: scale(0) rotate(-180deg); opacity: 0; } 50% { transform: scale(1.2) rotate(10deg); opacity: 1; } 100% { transform: scale(1) rotate(0); } }
        .dark-transition .title { color: #ff416c; font-size: 1.8em; font-weight: bold; text-transform: uppercase; letter-spacing: 6px; margin-top: 15px; opacity: 0; animation: titleAppear 0.8s ease 0.7s forwards; text-shadow: 0 0 20px #ff416c; }
        @keyframes titleAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .dark-transition .subtitle { color: #ff6b6b; font-size: 0.95em; margin-top: 8px; opacity: 0; animation: titleAppear 0.8s ease 1s forwards; }
        .dark-transition .enter-btn, .boss-transition .challenge-btn {
            margin-top: 35px;
            padding: 14px 35px;
            border-radius: 40px;
            color: white;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            opacity: 0;
            animation: btnAppear 0.6s ease 1.5s forwards;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
        }
        .dark-transition .enter-btn { background: linear-gradient(135deg, #ff416c, #ff4b2b); box-shadow: 0 0 25px rgba(255,65,108,0.5); }
        .dark-transition .enter-btn:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(255,65,108,0.7); }
        @keyframes btnAppear { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .dark-transition .flames { position: absolute; bottom: 0; width: 100%; display: flex; justify-content: center; gap: 3px; }
        .dark-transition .flame { font-size: 2.5em; animation: flameFlicker 0.3s ease infinite alternate; }
        .dark-transition .flame:nth-child(odd) { animation-delay: 0.15s; }
        @keyframes flameFlicker { from { transform: scaleY(1); } to { transform: scaleY(1.15) translateY(-5px); } }
        .dark-transition .smoke { position: absolute; font-size: 2.5em; opacity: 0; animation: smokeRise 1.8s ease forwards; }
        .dark-transition .smoke:nth-child(1) { left: 25%; animation-delay: 0.1s; }
        .dark-transition .smoke:nth-child(2) { left: 40%; animation-delay: 0.2s; }
        .dark-transition .smoke:nth-child(3) { left: 55%; animation-delay: 0.3s; }

                { id: 18, question: "Variável para 'usuário logado'?", options: ['l←"sim"', 'l←1', 'l←verdadeiro', 'l←"true"'], correct: 2, explanation: "Estados binários = Booleano." },
                { id: 19, code: "x←7\ny←3\ntemp←x\nx←y\ny←temp", question: "Valores finais?", options: ["x=7,y=3", "x=3,y=7", "x=3,y=3", "x=7,y=7"], correct: 1, explanation: "Algoritmo de troca." },
                { id: 20, code: 't←"A"\nv←99.90\nq←2\nd←true', question: "Quantos tipos?", options: ["2", "3", "4", "5"], correct: 2, explanation: "String, Real, Inteiro, Booleano = 4." }
            ]
        };

        // ==================== ESTADO ====================
        let gameState = { completedStages: [], bossCompleted: false, worldCompleted: false, totalErrors: 0, currentAttempts: 0 };
        let currentStage = null;
        let selectedOption = null;
        let matchSelections = { left: null, right: null };
        let matchedPairs = [];
        let bossState = { questions: [], currentIndex: 0, answers: [], score: 0 };
                // ==================== PROGRESSO ====================
        function loadProgress() {
            const saved = localStorage.getItem('algoritmoQuest_world1_v3');
            if (saved) gameState = { ...gameState, ...JSON.parse(saved) };
        }

        function saveProgress() {
            localStorage.setItem('algoritmoQuest_world1_v3', JSON.stringify(gameState));
        }

        function resetProgress() {
            if (confirm('⚠️ Tem certeza?\n\nTodo o progresso será perdido!')) {
                localStorage.removeItem('algoritmoQuest_world1_v3');
                location.reload();
            }
        }

        // ==================== HOME ====================
        function renderHome() {
            // Progress word
            const word = "ALGORITMO";
            document.getElementById('homeProgressWord').innerHTML = word.split('').map((letter, i) => {
                const unlocked = i === 0 && gameState.worldCompleted;
                return `<span class="${unlocked ? 'unlocked' : ''}">${unlocked ? letter : '?'}</span>`;
            }).join('');

            // Planets
            let html = '';
            WORLDS_DATA.forEach((world, i) => {
                const isCompleted = i === 0 && gameState.worldCompleted;
                const isCurrent = i === 0 && !gameState.worldCompleted;
                const isLocked = i > 0;
                
                html += `
                    <div class="planet world-${world.id} ${isCompleted ? 'completed' : ''} ${isCurrent ? 'current' : ''} ${isLocked ? 'locked' : ''}"
                        onclick="${!isLocked ? 'openWorld(' + world.id + ')' : ''}">
                        <span class="planet-icon">${world.icon}</span>
                        <span class="planet-letter">${world.letter}</span>
                        <span class="planet-number">${world.name}</span>
                    </div>
                `;
            });
            document.getElementById('worldsGrid').innerHTML = html;
        }

        function openWorld(worldId) {
            document.getElementById('homeView').style.display = 'none';
            document.getElementById('mapView').style.display = 'block';
            document.getElementById('mapView').classList.add('active');
            renderMap();
            setTimeout(() => {
                const start = document.querySelector('.start-badge');
                if (start) start.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        function goToHome() {
            document.getElementById('mapView').classList.remove('active');
            document.getElementById('mapView').style.display = 'none';
            document.getElementById('homeView').style.display = 'block';
            renderHome();
        }

        // ==================== MAP ====================
        function renderMap() {
            // Progress word
            const word = "ALGORITMO";
            document.getElementById('progressWord').innerHTML = word.split('').map((letter, i) => {
                const unlocked = i === 0 && gameState.worldCompleted;
                return `<span class="${unlocked ? 'unlocked' : ''}">${unlocked ? letter : '?'}</span>`;
            }).join('');

            // Progress indicator
            document.getElementById('progressIndicator').innerHTML = `📊 ${gameState.completedStages.length}/10 casas • Erros: ${gameState.totalErrors}`;

            // Map
            let html = '';
            
            // Boss
            const bossUnlocked = gameState.completedStages.length === 10 && !gameState.bossCompleted;
            const bossCompleted = gameState.bossCompleted;
            html += `<div class="stage boss ${bossCompleted ? 'completed' : ''} ${!bossUnlocked && !bossCompleted ? 'locked' : ''}" onclick="${bossUnlocked ? 'openBoss()' : ''}">
                <div class="stage-icon">${bossCompleted ? '✅' : '👑'}</div>
                <div class="stage-num">BOSS</div>
            </div>`;
            html += '<div class="path-line boss"></div>';

            // Casas 10-6 (Dark)
            for (let i = 9; i >= 5; i--) {
                const isCompleted = gameState.completedStages.includes(i);
                const prevCompleted = i === 5 ? gameState.completedStages.includes(4) : gameState.completedStages.includes(i - 1);
                const isLocked = !isCompleted && !prevCompleted;
                
                html += `<div class="stage dark ${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}" onclick="${!isLocked ? 'openStage(' + i + ')' : ''}">
                    <div class="stage-icon">${isCompleted ? '✅' : '💀'}</div>
                    <div class="stage-num">${i + 1}</div>
                </div>`;
                if (i > 5) html += '<div class="path-line dark"></div>';
            }

            html += '<div class="path-line dark"></div>';
            html += '<div class="dark-side-divider">Dark Side</div>';
            html += '<div class="path-line"></div>';

            // Casas 5-1 (Light)
            for (let i = 4; i >= 0; i--) {
                const isCompleted = gameState.completedStages.includes(i);
                const prevCompleted = i === 0 ? true : gameState.completedStages.includes(i - 1);
                const isLocked = !isCompleted && !prevCompleted;
                
                html += `<div class="stage light ${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}" onclick="${!isLocked ? 'openStage(' + i + ')' : ''}">
                    <div class="stage-icon">${isCompleted ? '✅' : '🏠'}</div>
                    <div class="stage-num">${i + 1}</div>
                </div>`;
                if (i > 0) html += '<div class="path-line"></div>';
            }

            html += '<div class="path-line"></div>';
            html += '<div class="start-badge">🚀 INÍCIO</div>';

            document.getElementById('mapContainer').innerHTML = html;
        }

        // ==================== STAGES ====================
        function openStage(index) {
            const stage = WORLD.stages[index];
            currentStage = { index, data: stage };
            gameState.currentAttempts = 0;
            selectedOption = null;
            matchSelections = { left: null, right: null };
            matchedPairs = [];
            
            document.getElementById('modalContent').className = `modal-content ${stage.zone === 'dark' ? 'dark-mode' : ''}`;
            renderStage(stage, index);
            document.getElementById('gameModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('gameModal').classList.remove('show');
            currentStage = null;
            renderMap();
        }

        function renderStage(stage, index) {
            const types = { multiple: '📝 Múltipla Escolha', fill: '✏️ Completar', drag: '↕️ Ordenar', match: '🔗 Associar' };
            
            let html = `<div class="question-area">
                <div class="question-header">
                    <span class="question-type">${types[stage.type]}</span>
                    <span class="attempt-counter">Tentativas: ${gameState.currentAttempts}</span>
                </div>
                <div class="question-context">${stage.context}</div>
                ${stage.code ? `<div class="question-code">${stage.code}</div>` : ''}
                ${stage.question ? `<div class="question-text">${stage.question}</div>` : ''}`;

            if (stage.type === 'multiple') {
                html += '<div class="options">';
                stage.options.forEach((opt, i) => {
                    html += `<div class="option" onclick="selectOption(${i})" id="option${i}">
                        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                        <span>${opt}</span>
                    </div>`;
                });
                html += '</div>';
            } else if (stage.type === 'fill') {
                let tpl = stage.template;
                stage.blanks.forEach((b, i) => {
                    tpl = tpl.replace(`{${i}}`, `<input type="text" id="blank${i}" placeholder="${b.placeholder}" autocomplete="off">`);
                });
                html += `<div class="fill-blank">${tpl}</div>`;
            } else if (stage.type === 'drag') {
                const shuffled = [...stage.items].sort(() => Math.random() - 0.5);
                html += '<div class="draggable-area" id="dragArea">';
                shuffled.forEach(item => {
                    html += `<div class="drag-item" draggable="true" data-correct="${item.correctPosition}">${item.text}</div>`;
                });
                html += '</div>';
            } else if (stage.type === 'match') {
                const shuffledLeft = [...stage.pairs].sort(() => Math.random() - 0.5);
                const shuffledRight = [...stage.pairs].sort(() => Math.random() - 0.5);
                html += '<div class="match-container"><div class="match-column"><div class="match-column-title">TIPO</div>';
                shuffledLeft.forEach(p => {
                    html += `<div class="match-item" data-id="${p.id}" data-side="left" onclick="selectMatch(this,'left',${p.id})">${p.left}</div>`;
                });
                html += '</div><div class="match-column"><div class="match-column-title">VALOR</div>';
                shuffledRight.forEach(p => {
                    html += `<div class="match-item" data-id="${p.id}" data-side="right" onclick="selectMatch(this,'right',${p.id})">${p.right}</div>`;
                });
                html += '</div></div>';
            }

            html += `<div id="feedback" class="feedback"></div>
                <div class="action-buttons">
                    <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">✔️ Verificar</button>
                    <button class="btn btn-success" id="nextBtn" style="display:none" onclick="goNext()">Continuar →</button>
                    <button class="btn btn-secondary" onclick="closeModal()">↩️ Voltar</button>
                </div>
            </div>`;

            document.getElementById('modalTitle').textContent = `Casa ${index + 1} de 10`;
            document.getElementById('modalSubtitle').textContent = stage.zone === 'dark' ? '💀 Dark Side' : '🏠 Zona Clara';
            document.getElementById('modalBody').innerHTML = html;
            
            if (stage.type === 'drag') setupDrag();
        }

        // ==================== INTERAÇÕES ====================
        function selectOption(i) {
            selectedOption = i;
            document.querySelectorAll('.option').forEach((el, idx) => el.classList.toggle('selected', idx === i));
        }

        function setupDrag() {
            const container = document.getElementById('dragArea');
            let dragged = null;
            
            container.querySelectorAll('.drag-item').forEach(item => {
                item.addEventListener('dragstart', () => { dragged = item; item.classList.add('dragging'); });
                item.addEventListener('dragend', () => { item.classList.remove('dragging'); dragged = null; });
                item.addEventListener('touchstart', () => { dragged = item; item.classList.add('dragging'); }, {passive: true});
                item.addEventListener('touchmove', e => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const after = getDragAfter(container, touch.clientY);
                    after ? container.insertBefore(dragged, after) : container.appendChild(dragged);
                }, {passive: false});
                item.addEventListener('touchend', () => { item.classList.remove('dragging'); dragged = null; });
            });
            
            container.addEventListener('dragover', e => {
                e.preventDefault();
                const after = getDragAfter(container, e.clientY);
                if (dragged) after ? container.insertBefore(dragged, after) : container.appendChild(dragged);
            });
        }

        function getDragAfter(container, y) {
            const items = [...container.querySelectorAll('.drag-item:not(.dragging)')];
            return items.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                return offset < 0 && offset > closest.offset ? { offset, element: child } : closest;
            }, { offset: -Infinity }).element;
        }

        function selectMatch(el, side, id) {
            if (el.classList.contains('matched')) return;
            document.querySelectorAll(`.match-item[data-side="${side}"]`).forEach(e => { if (!e.classList.contains('matched')) e.classList.remove('selected'); });
            el.classList.add('selected');
            matchSelections[side] = id;
            if (matchSelections.left !== null && matchSelections.right !== null) checkMatchPair();
        }

        function checkMatchPair() {
            const left = document.querySelector(`.match-item[data-side="left"][data-id="${matchSelections.left}"]`);
            const right = document.querySelector(`.match-item[data-side="right"][data-id="${matchSelections.right}"]`);
            if (matchSelections.left === matchSelections.right) {
                matchedPairs.push(matchSelections.left);
                left.classList.remove('selected'); left.classList.add('matched');
                right.classList.remove('selected'); right.classList.add('matched');
            } else {
                left.classList.add('wrong'); right.classList.add('wrong');
                setTimeout(() => { left.classList.remove('selected', 'wrong'); right.classList.remove('selected', 'wrong'); }, 500);
            }
            matchSelections = { left: null, right: null };
        }

        // ==================== VERIFICAÇÃO ====================
        function checkAnswer() {
            const stage = currentStage.data;
            const feedback = document.getElementById('feedback');
            gameState.currentAttempts++;
            document.querySelector('.attempt-counter').textContent = `Tentativas: ${gameState.currentAttempts}`;
            
            let correct = false;
            const isDark = stage.zone === 'dark';

            if (stage.type === 'multiple') {
                if (selectedOption === null) { alert('Selecione uma opção!'); return; }
                correct = selectedOption === stage.correct;
                if (!correct) {
                    document.getElementById(`option${selectedOption}`).classList.add('incorrect');
                    const hint = isDark || !stage.hints.length ? "Incorreto." : stage.hints[Math.min(gameState.currentAttempts - 1, stage.hints.length - 1)];
                    feedback.innerHTML = `❌ ${hint}`;
                    feedback.className = 'feedback show incorrect';
                    setTimeout(() => { document.querySelectorAll('.option').forEach(e => e.classList.remove('incorrect', 'selected')); selectedOption = null; }, 1200);
                    gameState.totalErrors++; saveProgress(); renderMap();
                    return;
                }
                document.getElementById(`option${selectedOption}`).classList.add('correct');
            } else if (stage.type === 'fill') {
                const answers = stage.blanks.map((_, i) => document.getElementById(`blank${i}`).value);
                const results = stage.validate(answers);
                correct = results.every(r => r.correct);
                results.forEach((r, i) => {
                    const input = document.getElementById(`blank${i}`);
                    input.classList.remove('correct', 'incorrect');
                    input.classList.add(r.correct ? 'correct' : 'incorrect');
                });
                if (!correct) {
                    const firstErr = results.find(r => !r.correct);
                    feedback.innerHTML = `❌ ${isDark ? 'Incorreto.' : firstErr.hint}`;
                    feedback.className = 'feedback show incorrect';
                    gameState.totalErrors++; saveProgress(); renderMap();
                    return;
                }
            } else if (stage.type === 'drag') {
                const order = [...document.querySelectorAll('.drag-item')].map(e => parseInt(e.dataset.correct));
                correct = JSON.stringify(order) === JSON.stringify([0, 1, 2]);
                if (!correct) {
                    const hint = isDark || !stage.hints.length ? "Incorreto." : stage.hints[Math.min(gameState.currentAttempts - 1, stage.hints.length - 1)];
                    feedback.innerHTML = `❌ ${hint}`;
                    feedback.className = 'feedback show incorrect';
                    gameState.totalErrors++; saveProgress(); renderMap();
                    return;
                }
            } else if (stage.type === 'match') {
                correct = matchedPairs.length === stage.pairs.length;
                if (!correct) {
                    feedback.innerHTML = `❌ Faltam ${stage.pairs.length - matchedPairs.length} par(es).`;
                    feedback.className = 'feedback show incorrect';
                    return;
                }
            }

            // Acertou!
            feedback.innerHTML = `✅ ${stage.successMessage}`;
            feedback.className = 'feedback show correct';
            if (!gameState.completedStages.includes(currentStage.index)) {
                gameState.completedStages.push(currentStage.index);
                saveProgress();
            }
            document.getElementById('checkBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-flex';
            document.querySelectorAll('.option, .match-item, .drag-item').forEach(e => e.style.pointerEvents = 'none');
            document.querySelectorAll('input').forEach(e => e.disabled = true);
        }

        function goNext() {
            const nextIndex = currentStage.index + 1;
            
            // Casa 10 → Boss
            if (nextIndex === 10) {
                closeModal();
                openBoss();
                return;
            }
            
            // Entrando no Dark Side
            if (nextIndex === 5) {
                closeModal();
                showDarkTransition(() => openStage(nextIndex));
                return;
            }
            
            // Transição normal
            if (nextIndex < 10) {
                const stage = WORLD.stages[nextIndex];
                currentStage = { index: nextIndex, data: stage };
                gameState.currentAttempts = 0;
                selectedOption = null;
                matchSelections = { left: null, right: null };
                matchedPairs = [];
                document.getElementById('modalContent').className = `modal-content ${stage.zone === 'dark' ? 'dark-mode' : ''}`;
                renderStage(stage, nextIndex);
            } else {
                closeModal();
            }
        }

        // ==================== TRANSIÇÕES ====================
        function showDarkTransition(callback) {
            const transition = document.getElementById('darkTransition');
            transition.classList.add('show');
            document.getElementById('enterDarkBtn').onclick = () => {
                transition.classList.remove('show');
                if (callback) callback();
            };
        }

        function showBossTransition(callback) {
            const transition = document.getElementById('bossTransition');
            transition.classList.add('show');
            document.getElementById('challengeBossBtn').onclick = () => {
                transition.classList.remove('show');
                if (callback) callback();
            };
        }

        // ==================== BOSS ====================
        function openBoss() {
            showBossTransition(() => {
                const shuffled = [...WORLD.bossQuestions].sort(() => Math.random() - 0.5);
                bossState = { questions: shuffled.slice(0, 10), currentIndex: 0, answers: [], score: 0 };
                document.getElementById('modalContent').className = 'modal-content dark-mode';
                renderBossQuestion();
                document.getElementById('gameModal').classList.add('show');
            });
        }

        function renderBossQuestion() {
            const q = bossState.questions[bossState.currentIndex];
            const num = bossState.currentIndex + 1;
            
            let html = `<div class="boss-banner">
                <h2>👑 SIMULADO BOSS</h2>
                <p>Acerte 7 de 10 para conquistar a letra "A"</p>
                <div class="boss-progress">
                    <span>${num}/10</span>
                    <div class="boss-progress-bar"><div class="boss-progress-fill" style="width:${num * 10}%"></div></div>
                    <span>🎯</span>
                </div>
            </div>
            <div class="question-area">
                ${q.code ? `<div class="question-code">${q.code}</div>` : ''}
                <div class="question-text">${q.question}</div>
                <div class="options">`;
            
            q.options.forEach((opt, i) => {
                html += `<div class="option" onclick="selectBossOption(${i})" id="bossOpt${i}">
                    <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                    <span>${opt}</span>
                </div>`;
            });
            
            html += `</div>
                <div class="action-buttons">
                    <button class="btn btn-danger" onclick="submitBossAnswer()">${num === 10 ? '🏁 Finalizar' : 'Próxima →'}</button>
                </div>
            </div>`;
            
            document.getElementById('modalTitle').textContent = `Questão ${num}/10`;
            document.getElementById('modalSubtitle').textContent = 'Simulado Final';
            document.getElementById('modalBody').innerHTML = html;
            selectedOption = null;
        }

        function selectBossOption(i) {
            selectedOption = i;
            document.querySelectorAll('.option').forEach((el, idx) => el.classList.toggle('selected', idx === i));
        }

        function submitBossAnswer() {
            if (selectedOption === null) { alert('Selecione!'); return; }
            const q = bossState.questions[bossState.currentIndex];
            bossState.answers.push({ question: q, selected: selectedOption, correct: selectedOption === q.correct });
            if (selectedOption === q.correct) bossState.score++;
            bossState.currentIndex++;
            bossState.currentIndex < 10 ? renderBossQuestion() : showBossResults();
        }

        function showBossResults() {
            const passed = bossState.score >= 7;
            let html = `<div class="results-card">
                <h2>${passed ? '🎉 PARABÉNS!' : '😔 Quase lá...'}</h2>
                <div class="results-score ${passed ? 'pass' : 'fail'}">${bossState.score}/10</div>
                <p>${passed ? 'Você conquistou a letra "A"!' : `Precisa de 7. Conseguiu ${bossState.score}.`}</p>
                <div class="results-details"><h4>📋 Revisão:</h4>`;
            
            bossState.answers.forEach((a, i) => {
                html += `<div class="result-item ${a.correct ? 'correct' : 'incorrect'}">
                    <strong>${a.correct ? '✅' : '❌'} Q${i + 1}</strong>
                    ${!a.correct ? `<div class="explanation">Resposta: ${a.question.options[a.question.correct]}<br>${a.question.explanation}</div>` : ''}
                </div>`;
            });
            
            html += `</div>
                <div class="action-buttons">
                    ${passed ? '<button class="btn btn-success" onclick="completeBoss()">🎉 Celebrar!</button>' : '<button class="btn btn-primary" onclick="openBoss()">🔄 Tentar</button>'}
                    <button class="btn btn-secondary" onclick="closeModal()">↩️ Voltar</button>
                </div>
            </div>`;
            
            document.getElementById('modalTitle').textContent = passed ? '🏆 Vitória!' : '📊 Resultado';
            document.getElementById('modalSubtitle').textContent = `${bossState.score}/10 acertos`;
            document.getElementById('modalBody').innerHTML = html;
        }

        function completeBoss() {
            gameState.bossCompleted = true;
            gameState.worldCompleted = true;
            saveProgress();
            closeModal();
            showVictory();
        }

        function showVictory() {
            document.getElementById('victoryLetter').textContent = 'A';
            document.getElementById('victorySub').textContent = 'Você dominou Variáveis e Tipos!';
            document.getElementById('victoryOverlay').classList.add('show');
            
            // Confetti
            for (let i = 0; i < 50; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.background = ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#ff6bd6', '#00d4ff'][Math.floor(Math.random() * 6)];
                c.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        function closeVictory() {
            document.getElementById('victoryOverlay').classList.remove('show');
            goToHome();
        }

        // ==================== INIT ====================
        window.addEventListener('load', () => {
            loadProgress();
            renderHome();
        });

        document.getElementById('gameModal').addEventListener('click', e => { if (e.target.id === 'gameModal') closeModal(); });
    </script>
</body>
</html>
