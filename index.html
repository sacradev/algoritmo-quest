<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algoritmo Quest</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* HOME */
        .home-container {
            max-width: 450px;
            margin: 0 auto;
        }

        .home-header {
            text-align: center;
            color: white;
            margin-bottom: 25px;
        }

        .home-header h1 {
            font-size: 1.9em;
            margin-bottom: 5px;
        }

        .home-progress-word {
            font-size: 1.6em;
            letter-spacing: 5px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 4px;
        }

        .home-progress-word span {
            width: 34px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .home-progress-word span.unlocked {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
            box-shadow: 0 0 15px rgba(0,212,255,0.5);
        }

        .worlds-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 25px 0;
        }
        .planet-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .planet-cell .planet-number {
            font-size: 0.62em;
            color: rgba(255,255,255,0.7);
            text-align: center;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
            line-height: 1.3;
            width: 115px;
        }

        /* ===================== PLANETAS CSS ===================== */
.planet {
    width: 115px;
    height: 115px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.3s ease;
    position: relative;
    flex-shrink: 0;
    overflow: visible;
}

.planet:hover:not(.locked) { transform: scale(1.15); }

/* Atmosfera */
.planet-surface {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    position: relative;
}

/* Brilho de luz no topo */
.planet-surface::after {
    content: '';
    position: absolute;
    top: 10%;
    left: 14%;
    width: 32%;
    height: 26%;
    background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 5;
}

/* Sombra lateral (profundidade) */
.planet-surface::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 75% 65%, rgba(0,0,0,0.55) 0%, transparent 60%);
    z-index: 4;
    pointer-events: none;
}

.planet-letter {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 2.2em;
    font-weight: 900;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9), 0 0 20px rgba(0,0,0,0.6);
    z-index: 10;
    pointer-events: none;
}

.planet-number {
    font-size: 0.65em;
    color: rgba(255,255,255,0.85);
    text-align: center;
    line-height: 1.3;
    width: 90px;
    word-wrap: break-word;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
    margin-top: 6px;
}

/* Locked */
.planet.locked { opacity: 0.4; cursor: not-allowed; filter: brightness(0.4) saturate(0.6); }
.planet.locked:hover { transform: none; }

/* Completed — check badge */
.planet-check {
    position: absolute;
    top: 2px; right: 2px;
    width: 26px; height: 26px;
    background: #00c853;
    border-radius: 50%;
    font-size: 0.8em;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #fff;
    z-index: 30;
    font-weight: bold;
    pointer-events: none;
}
/* Brilho verde no planeta completo */
.planet.completed { filter: drop-shadow(0 0 10px rgba(0,200,83,0.5)); }

/* Current — pulsa */
.planet.current { animation: planetPulse 3s ease-in-out infinite; }
@keyframes planetPulse {
    0%, 100% { box-shadow: inherit; filter: brightness(1); }
    50% { filter: brightness(1.2); box-shadow: 0 0 30px rgba(255,255,255,0.5); }
}

/* ===== MUNDO 1 — Marte (rochoso vermelho) ===== */
.world-1 .planet-surface {
    background:
        radial-gradient(ellipse 80% 18% at 28% 33%, rgba(200,90,40,0.8) 0%, transparent 55%),
        radial-gradient(ellipse 55% 12% at 72% 62%, rgba(120,40,10,0.7) 0%, transparent 50%),
        linear-gradient(135deg, #c04020 0%, #8b2500 35%, #d05030 65%, #7a1f00 100%);
    background-size: 300% 100%;
    animation: rotateSurface 25s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(80,10,0,0.7);
}
.world-1 { box-shadow: 0 0 25px rgba(200,60,20,0.5), 0 0 8px rgba(255,100,50,0.3); }

/* ===== MUNDO 2 — Oceânico azul ===== */
.world-2 .planet-surface {
    background:
        radial-gradient(ellipse 70% 22% at 25% 38%, rgba(0,200,255,0.5) 0%, transparent 55%),
        radial-gradient(ellipse 50% 14% at 72% 65%, rgba(0,60,160,0.7) 0%, transparent 50%),
        radial-gradient(ellipse 80% 8% at 50% 82%, rgba(80,200,255,0.25) 0%, transparent 40%),
        linear-gradient(160deg, #0066cc 0%, #003399 28%, #0088ee 55%, #001a66 80%, #0055bb 100%);
    background-size: 300% 100%;
    animation: rotateSurface 30s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(0,20,80,0.7);
}
.world-2 { box-shadow: 0 0 25px rgba(0,100,200,0.5), 0 0 8px rgba(0,180,255,0.3); }

/* ===== MUNDO 3 — Gasoso laranja (Júpiter) ===== */
.world-3 .planet-surface {
    background:
        repeating-linear-gradient(0deg, rgba(160,70,0,0.65) 0px, rgba(160,70,0,0.65) 6px, transparent 6px, transparent 12px),
        repeating-linear-gradient(0deg, rgba(255,190,60,0.35) 2px, rgba(255,190,60,0.35) 4px, transparent 4px, transparent 16px),
        linear-gradient(180deg, #cc6600 0%, #ff9900 18%, #cc5500 32%, #ffaa33 46%, #993300 60%, #ff8800 74%, #cc4400 88%, #ffaa00 100%);
    background-size: 300% 100%;
    animation: rotateSurface 18s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(80,30,0,0.6);
}
.world-3 { box-shadow: 0 0 25px rgba(200,120,0,0.5), 0 0 8px rgba(255,180,50,0.3); }

/* ===== MUNDO 4 — Roxo nebuloso ===== */
.world-4 .planet-surface {
    background:
        radial-gradient(ellipse 65% 20% at 30% 40%, rgba(180,80,255,0.6) 0%, transparent 55%),
        radial-gradient(ellipse 45% 15% at 70% 65%, rgba(80,0,160,0.7) 0%, transparent 50%),
        linear-gradient(150deg, #6600cc 0%, #330066 30%, #9933ff 55%, #440088 80%, #7700bb 100%);
    background-size: 300% 100%;
    animation: rotateSurface 22s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(40,0,80,0.7);
}
.world-4 { box-shadow: 0 0 25px rgba(120,0,200,0.5), 0 0 8px rgba(180,80,255,0.3); }

/* ===== MUNDO 5 — Gelado branco azulado ===== */
.world-5 .planet-surface {
    background:
        radial-gradient(ellipse 75% 18% at 25% 35%, rgba(200,240,255,0.7) 0%, transparent 55%),
        radial-gradient(ellipse 50% 12% at 70% 60%, rgba(100,180,220,0.5) 0%, transparent 50%),
        radial-gradient(ellipse 60% 8% at 50% 78%, rgba(180,220,240,0.4) 0%, transparent 40%),
        linear-gradient(140deg, #aaddff 0%, #5599cc 25%, #cceeff 50%, #3377aa 75%, #99ccee 100%);
    background-size: 300% 100%;
    animation: rotateSurface 28s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(0,40,80,0.5);
}
.world-5 { box-shadow: 0 0 25px rgba(100,180,240,0.5), 0 0 8px rgba(200,240,255,0.4); }

/* ===== MUNDO 6 — Dourado tempestuoso ===== */
.world-6 .planet-surface {
    background:
        repeating-linear-gradient(0deg, rgba(180,140,0,0.5) 0px, rgba(180,140,0,0.5) 5px, transparent 5px, transparent 10px),
        radial-gradient(ellipse 55% 18% at 40% 45%, rgba(255,220,0,0.6) 0%, transparent 55%),
        linear-gradient(155deg, #cc9900 0%, #886600 28%, #ffcc00 52%, #664400 76%, #bbaa00 100%);
    background-size: 300% 100%;
    animation: rotateSurface 20s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(60,40,0,0.7);
}
.world-6 { box-shadow: 0 0 25px rgba(180,140,0,0.5), 0 0 8px rgba(255,220,0,0.3); }

/* ===== MUNDO 7 — Verde tóxico ===== */
.world-7 .planet-surface {
    background:
        radial-gradient(ellipse 70% 20% at 30% 38%, rgba(50,255,100,0.5) 0%, transparent 55%),
        radial-gradient(ellipse 45% 14% at 68% 62%, rgba(0,120,40,0.7) 0%, transparent 50%),
        linear-gradient(145deg, #006600 0%, #003300 28%, #00aa44 52%, #004400 76%, #008833 100%);
    background-size: 300% 100%;
    animation: rotateSurface 24s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(0,30,0,0.7);
}
.world-7 { box-shadow: 0 0 25px rgba(0,160,60,0.5), 0 0 8px rgba(50,255,100,0.3); }

/* ===== MUNDO 8 — Sombrio cinza com núcleo ===== */
.world-8 .planet-surface {
    background:
        radial-gradient(circle at 50% 50%, rgba(80,80,120,0.6) 0%, transparent 40%),
        radial-gradient(ellipse 65% 18% at 28% 36%, rgba(120,120,160,0.5) 0%, transparent 55%),
        linear-gradient(140deg, #2a2a3e 0%, #111122 28%, #3a3a55 52%, #0a0a18 76%, #222233 100%);
    background-size: 300% 100%;
    animation: rotateSurface 35s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(0,0,20,0.8);
}
.world-8 { box-shadow: 0 0 25px rgba(80,80,160,0.4), 0 0 8px rgba(120,120,200,0.25); }

/* ===== MUNDO 9 — Cristalino final (branco dourado) ===== */
.world-9 .planet-surface {
    background:
        radial-gradient(ellipse 60% 25% at 30% 30%, rgba(255,255,200,0.7) 0%, transparent 50%),
        radial-gradient(ellipse 40% 15% at 70% 65%, rgba(255,220,100,0.5) 0%, transparent 45%),
        radial-gradient(circle at 55% 50%, rgba(255,200,50,0.3) 0%, transparent 40%),
        linear-gradient(135deg, #ffe066 0%, #cc9900 25%, #fff0aa 50%, #aa7700 75%, #ffdd44 100%);
    background-size: 300% 100%;
    animation: rotateSurface 15s linear infinite;
    box-shadow: inset -18px -14px 35px rgba(80,50,0,0.5);
}
.world-9 { box-shadow: 0 0 30px rgba(255,200,0,0.6), 0 0 12px rgba(255,240,100,0.4); }

@keyframes rotateSurface {
    from { background-position: 0% 50%; }
    to { background-position: 200% 50%; }
}

        .reset-container { text-align: center; margin-top: 25px; }
        .btn-reset {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-reset:hover { background: rgba(255,82,82,0.3); border-color: #ff5252; color: white; }

        /* MAP VIEW */
        .map-view { display: none; }
        .map-view.active { display: block; }

        .container { max-width: 400px; margin: 0 auto; }

        header { text-align: center; color: white; margin-bottom: 20px; }
        header h1 { font-size: 1.6em; margin-bottom: 5px; }

        .progress-word {
            font-size: 1.4em;
            letter-spacing: 4px;
            margin: 15px 0;
            display: flex;
            justify-content: center;
            gap: 3px;
        }

        .progress-word span {
            width: 30px;
            height: 38px;
            background: rgba(255,255,255,0.2);
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .progress-word span.unlocked {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #000;
        }

        .map-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px;
        }

        .path-line { width: 4px; height: 45px; background: rgba(255,255,255,0.3); }
        .path-line.dark { background: rgba(255,100,100,0.4); }
        .path-line.boss { background: linear-gradient(180deg, #ffd700, #ff6b4a); height: 60px; }

        .stage {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .stage:hover:not(.locked) { transform: scale(1.1); }
        .stage-icon { font-size: 1.6em; margin-bottom: 2px; }
        .stage-num { font-weight: bold; font-size: 0.9em; }

        .stage.light { background: linear-gradient(135deg, #00d4ff, #0099cc); color: white; border: 3px solid #00e5ff; }
        .stage.light.completed { background: linear-gradient(135deg, #00c853, #00e676); border-color: #69f0ae; }
        .stage.light.locked { background: linear-gradient(135deg, #546e7a, #37474f); border-color: #78909c; opacity: 0.5; cursor: not-allowed; }

        .stage.dark { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; border: 3px solid #ff6b6b; }
        .stage.dark.completed { background: linear-gradient(135deg, #00c853, #00e676); border-color: #69f0ae; }
        .stage.dark.locked { background: linear-gradient(135deg, #4a1a1a, #2d1a1a); border-color: #6b3a3a; opacity: 0.5; cursor: not-allowed; }

        .stage.boss { width: 100px; height: 100px; background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1a2e; border: 4px solid #ffea00; }
        .stage.boss.locked { background: linear-gradient(135deg, #5d4e37, #3d3327); border-color: #7d6e57; opacity: 0.5; cursor: not-allowed; }
        .stage.boss .stage-icon { font-size: 2em; }

        .stage.completed::after {
            content: '✓';
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            background: #00c853;
            border-radius: 50%;
            font-size: 0.75em;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
        }

        .dark-side-divider {
            width: 100%;
            max-width: 250px;
            padding: 10px 15px;
            margin: 12px 0;
            background: linear-gradient(90deg, transparent, #ff416c, #ff4b2b, #ff416c, transparent);
            border-radius: 8px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: darkPulse 3s infinite;
        }
        .dark-side-divider::before, .dark-side-divider::after { content: '⚡'; margin: 0 6px; }
        @keyframes darkPulse { 0%, 100% { box-shadow: 0 0 20px rgba(255,65,108,0.5); } 50% { box-shadow: 0 0 40px rgba(255,65,108,0.8); } }

        .start-badge {
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 0.9em;
        }

        .progress-indicator {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 8px 18px;
            border-radius: 20px;
            color: white;
            font-size: 0.8em;
            z-index: 100;
        }

        code { background: #e8e8e8; padding: 2px 5px; border-radius: 3px; font-family: 'Courier New', monospace; color: #d63384; font-size: 0.85em; }

        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; padding: 15px; }
        .modal.show { display: flex; }

        .modal-content {
            background: white;
            border-radius: 18px;
            padding: 22px;
            max-width: 480px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        .modal-content.dark-mode { background: linear-gradient(135deg, #1a1a2e, #2d1a3e); color: white; border: 2px solid #ff416c; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

        .modal-close { position: absolute; top: 12px; right: 15px; font-size: 1.3em; cursor: pointer; color: #999; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .modal-close:hover { background: #fee; color: #ff416c; }
        .modal-content.dark-mode .modal-close { color: #ff6b6b; }

        .modal-header { text-align: center; margin-bottom: 18px; }
        .modal-header h2 { color: #667eea; font-size: 1.3em; margin-bottom: 4px; }
        .modal-content.dark-mode .modal-header h2 { color: #ff6b6b; }
        .modal-header .subtitle { color: #666; font-size: 0.85em; }
        .modal-content.dark-mode .modal-header .subtitle { color: #aaa; }

        .intro-card { background: linear-gradient(135deg, #f8f9ff, #e8ecff); padding: 18px; border-radius: 10px; margin-bottom: 18px; border-left: 4px solid #667eea; }
        .intro-card h3 { color: #667eea; margin-bottom: 8px; font-size: 1em; }
        .intro-card p { line-height: 1.5; color: #444; font-size: 0.9em; margin-bottom: 10px; }
        .intro-card pre { background: #1a1a2e; color: #f8f8f2; padding: 12px; border-radius: 8px; font-size: 0.8em; line-height: 1.4; white-space: pre-wrap; overflow-x: auto; }

        .question-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 8px 10px; background: #f5f5f5; border-radius: 6px; }
        .modal-content.dark-mode .question-header { background: rgba(255,255,255,0.1); }
        .question-type { background: #667eea; color: white; padding: 4px 10px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
        .modal-content.dark-mode .question-type { background: #ff416c; }
        .attempt-counter { color: #666; font-size: 0.8em; }
        .modal-content.dark-mode .attempt-counter { color: #aaa; }

        .question-context { color: #444; margin-bottom: 12px; padding: 12px; background: linear-gradient(135deg, #fff9e6, #fff3cd); border-radius: 8px; border-left: 3px solid #ffc107; line-height: 1.4; font-size: 0.9em; }
        .modal-content.dark-mode .question-context { background: rgba(255,193,7,0.15); color: #ffd54f; border-color: #ff9800; }

        .question-code { background: #1a1a2e; color: #f8f8f2; padding: 12px; border-radius: 8px; margin-bottom: 12px; font-family: 'Courier New', monospace; line-height: 1.5; font-size: 0.85em; white-space: pre-wrap; }

        .question-text { font-size: 0.95em; line-height: 1.4; margin-bottom: 12px; padding: 12px; background: linear-gradient(135deg, #f0f4ff, #e4e9ff); border-radius: 8px; border: 2px solid #667eea; }
        .modal-content.dark-mode .question-text { background: rgba(255,65,108,0.1); border-color: #ff416c; }

        .options { display: flex; flex-direction: column; gap: 8px; }
        .option { padding: 12px 14px; background: white; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .modal-content.dark-mode .option { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
        .option-letter { width: 28px; height: 28px; background: #f0f0f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #667eea; font-size: 0.85em; }
        .modal-content.dark-mode .option-letter { background: rgba(255,65,108,0.3); color: white; }
        .option:hover:not(.disabled) { border-color: #667eea; background: #f8f9ff; }
        .option.selected { border-color: #00d4ff; background: #e6f9ff; }
        .option.selected .option-letter { background: #00d4ff; color: white; }
        .option.correct { border-color: #00c853; background: #e8f5e9; }
        .option.correct .option-letter { background: #00c853; color: white; }
        .option.incorrect { border-color: #ff5252; background: #ffebee; }
        .option.disabled { pointer-events: none; }

        .fill-blank { background: #1a1a2e; color: #f8f8f2; padding: 18px; border-radius: 10px; font-family: 'Courier New', monospace; font-size: 0.85em; line-height: 1; white-space: pre; overflow-x: auto; }
        .fill-blank .fill-line { display: flex; align-items: center; min-height: 2em; }
        .fill-blank .fill-prefix { white-space: pre; flex-shrink: 0; min-width: 15ch; text-align: right; }
        .fill-blank .fill-suffix { white-space: pre; flex-shrink: 0; }
        .fill-blank .fill-inline { white-space: pre; flex-shrink: 0; }
        .fill-blank input { font-family: 'Courier New', monospace; padding: 4px 4px; border: 2px solid #00d4ff; border-radius: 4px; font-size: 0.85em; width: 90px; text-align: center; background: rgba(255,255,255,0.95); flex-shrink: 0; vertical-align: middle; }
        .fill-blank input:focus { outline: none; box-shadow: 0 0 0 2px rgba(0,212,255,0.3); }
        .fill-blank input.correct { border-color: #00c853; background: #c8e6c9; }

        <script>

            letter: "A",
            bossProva: 10,

                title: "📦 O que são Variáveis?",

nome ← {0}
idade ← {1}
clienteVIP ← {2}`,

                    template: `// Ficha do Aluno

nomeAluno ← {0}     
idade ← {1}         
pesoKg ← {2}        
alturaM ← {3}       
ativo ← {4}         `,
                    blanks: [

        // ==================== ESTADO ====================

        // ==================== PROGRESSO ====================

        function loadProgress() {

        // ==================== MAP ====================
        function renderMap() {
            const worldData = getCurrentWorldData();
            const totalStages = worldData.stages.length;
            const lightCount = worldData.stages.filter(s => s.zone === 'light').length;
            const darkCount = worldData.stages.filter(s => s.zone === 'dark').length;
            const bossData = worldData.bossQuestions || [];
            const bossTotal = bossData.length;
            const bossProva = worldData.bossProva || 10;
            const bossAprova = worldData.bossAprova || 7;

            // Progress word
            const word = "ALGORITMO";
            document.getElementById('progressWord').innerHTML = word.split('').map((letter, i) => {
                const ws = getWorldState(i + 1);

                return `<span class="${unlocked ? 'unlocked' : ''}">${unlocked ? letter : '?'}</span>`;
            }).join('');

            document.getElementById('progressIndicator').innerHTML =
                `📊 ${gameState.completedStages.length}/${totalStages} casas • Erros: ${gameState.totalErrors}`;

            let html = '';
            
            // Boss
            const bossUnlocked = gameState.completedStages.length === totalStages && !gameState.bossCompleted;
            const bossCompleted = gameState.bossCompleted;
            html += `<div class="stage boss ${bossCompleted ? 'completed' : ''} ${!bossUnlocked && !bossCompleted ? 'locked' : ''}" onclick="${bossUnlocked ? 'openBoss()' : ''}">

                <div class="stage-num">BOSS</div>
            </div>`;
            html += '<div class="path-line boss"></div>';

            // Casas Dark (de trás pra frente)
            const darkStart = lightCount;
            for (let i = totalStages - 1; i >= lightCount; i--) {
                const isCompleted = gameState.completedStages.includes(i);
                const prevCompleted = i === lightCount
                    ? gameState.completedStages.includes(lightCount - 1)
                    : gameState.completedStages.includes(i - 1);
                const isLocked = !isCompleted && !prevCompleted;
                html += `<div class="stage dark ${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}" onclick="${!isLocked ? 'openStage(' + i + ')' : ''}">
                    <div class="stage-icon">${isCompleted ? '✅' : '💀'}</div>
                    <div class="stage-num">Nível ${i + 1}</div>
                </div>`;
                if (i > lightCount) html += '<div class="path-line dark"></div>';

            html += '<div class="path-line dark"></div>';
            html += '<div class="dark-side-divider">Dark Side</div>';
            html += '<div class="path-line"></div>';

            // Casas Light (de trás pra frente)
            for (let i = lightCount - 1; i >= 0; i--) {
                const isCompleted = gameState.completedStages.includes(i);
                const prevCompleted = i === 0 ? true : gameState.completedStages.includes(i - 1);
                const isLocked = !isCompleted && !prevCompleted;
                html += `<div class="stage light ${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}" onclick="${!isLocked ? 'openStage(' + i + ')' : ''}">
                    <div class="stage-icon">${isCompleted ? '✅' : '🚀'}</div>

        // ==================== STAGES ====================
        function openStage(index) {
            const worldData = getCurrentWorldData();
            const stage = worldData.stages[index];
            currentStage = { index, data: stage };
            gameState.currentAttempts = 0;
            selectedOption = null;
            matchSelections = { left: null, right: null };
            matchedPairs = [];
            
            document.getElementById('modalContent').className = `modal-content ${stage.zone === 'dark' ? 'dark-mode' : ''}`;

            document.getElementById('gameModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('gameModal').classList.remove('show');
            currentStage = null;
            renderMap();
        }

        function renderStage(stage, index) {
            const worldData = getCurrentWorldData();
            const types = { multiple: '📝 Múltipla Escolha', fill: '✏️ Completar', drag: '↕️ Ordenar', match: '🔗 Associar' };
            
            let html = `<div class="question-area">
                <div class="question-header">
                    <span class="question-type">${types[stage.type]}</span>
                    <span class="attempt-counter">Tentativas: ${gameState.currentAttempts}</span>
                </div>
                <div class="question-context">${stage.context}</div>
                ${stage.code ? `<div class="question-code">${stage.code}</div>` : ''}
                ${stage.question ? `<div class="question-text">${stage.question}</div>` : ''}`;

            if (stage.type === 'multiple') {
                html += '<div class="options">';
                stage.options.forEach((opt, i) => {
                    html += `<div class="option" onclick="selectOption(${i})" id="option${i}">
                        <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                        <span>${opt}</span>
                    </div>`;
                });
                html += '</div>';
            } else if (stage.type === 'fill') {
                let tpl = stage.template;
                stage.blanks.forEach((b, i) => {
                    tpl = tpl.replace(`{${i}}`, `___BLANK${i}___`);
                });
                const lines = tpl.split('\n');
                let fillHtml = '<div class="fill-blank">';
                lines.forEach(line => {
                    if (!line.includes('___BLANK')) {
                        fillHtml += `<div class="fill-line"><span class="fill-prefix">${line}</span></div>`;
                    } else {
                        // Linha pode ter múltiplos blanks — processar todos
                        let lineHtml = '<div class="fill-line">';
                        const parts = line.split(/(___BLANK\d+___)/);
                        let isFirst = true;
                        parts.forEach(part => {
                            const bMatch = part.match(/___BLANK(\d+)___/);
                            if (bMatch) {
                                const idx = bMatch[1];
                                const b = stage.blanks[idx];
                                lineHtml += `<input type="text" id="blank${idx}" placeholder="${b.placeholder}" autocomplete="off">`;
                                isFirst = false;
                            } else if (part !== '') {
                                const cls = isFirst ? 'fill-prefix' : 'fill-inline';
                                lineHtml += `<span class="${cls}">${part}</span>`;
                            }
                        });
                        lineHtml += '</div>';
                        fillHtml += lineHtml;
                    }
                });
                fillHtml += '</div>';
                html += fillHtml;
            } else if (stage.type === 'drag') {
                const shuffled = [...stage.items];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                html += '<div class="draggable-area" id="dragArea">';
                shuffled.forEach(item => {
                    html += `<div class="drag-item" draggable="true" data-correct="${item.correctPosition}">${item.text}</div>`;
                });
                html += '</div>';
            } else if (stage.type === 'match') {
                const shuffledLeft = [...stage.pairs];
                for (let i = shuffledLeft.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffledLeft[i], shuffledLeft[j]] = [shuffledLeft[j], shuffledLeft[i]]; }
                const shuffledRight = [...stage.pairs];
                for (let i = shuffledRight.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffledRight[i], shuffledRight[j]] = [shuffledRight[j], shuffledRight[i]]; }
                html += '<div class="match-container"><div class="match-column"><div class="match-column-title">TIPO</div>';
                shuffledLeft.forEach(p => {
                    html += `<div class="match-item" data-id="${p.id}" data-side="left" onclick="selectMatch(this,'left',${p.id})">${p.left}</div>`;
                });
                html += '</div><div class="match-column"><div class="match-column-title">VALOR</div>';
                shuffledRight.forEach(p => {
                    html += `<div class="match-item" data-id="${p.id}" data-side="right" onclick="selectMatch(this,'right',${p.id})">${p.right}</div>`;
                });
                html += '</div></div>';
            }

            html += `<div id="feedback" class="feedback"></div>
                <div class="action-buttons">
                    <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()">✔️ Verificar</button>
                    <button class="btn btn-success" id="nextBtn" style="display:none" onclick="goNext()">Continuar →</button>
                    <button class="btn btn-secondary" onclick="closeModal()">↩️ Voltar</button>
                </div>
            </div>`;

            document.getElementById('modalTitle').textContent = stage.zone === 'dark' ? `💀 Nível ${index + 1}` : `🚀 Nível ${index + 1}`;
            document.getElementById('modalSubtitle').textContent = stage.zone === 'dark' ? 'Dark Side' : 'Zona Clara';
            document.getElementById('modalBody').innerHTML = html;
            
            if (stage.type === 'drag') setupDrag();
        }

        // ==================== INTERAÇÕES ====================
        function selectOption(i) {
            selectedOption = i;
            document.querySelectorAll('.option').forEach((el, idx) => el.classList.toggle('selected', idx === i));
        }

        function setupDrag() {
            const container = document.getElementById('dragArea');
            let dragged = null;
            
            container.querySelectorAll('.drag-item').forEach(item => {
                item.addEventListener('dragstart', () => { dragged = item; item.classList.add('dragging'); });
                item.addEventListener('dragend', () => { item.classList.remove('dragging'); dragged = null; });
                item.addEventListener('touchstart', () => { dragged = item; item.classList.add('dragging'); }, {passive: true});
                item.addEventListener('touchmove', e => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const after = getDragAfter(container, touch.clientY);
                    after ? container.insertBefore(dragged, after) : container.appendChild(dragged);
                }, {passive: false});
                item.addEventListener('touchend', () => { item.classList.remove('dragging'); dragged = null; });
            });
            
            container.addEventListener('dragover', e => {
                e.preventDefault();
                const after = getDragAfter(container, e.clientY);
                if (dragged) after ? container.insertBefore(dragged, after) : container.appendChild(dragged);
            });
        }

        function getDragAfter(container, y) {
            const items = [...container.querySelectorAll('.drag-item:not(.dragging)')];
            return items.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                return offset < 0 && offset > closest.offset ? { offset, element: child } : closest;
            }, { offset: -Infinity }).element;
        }

        function selectMatch(el, side, id) {
            if (el.classList.contains('matched')) return;
            document.querySelectorAll(`.match-item[data-side="${side}"]`).forEach(e => { if (!e.classList.contains('matched')) e.classList.remove('selected'); });
            el.classList.add('selected');
            matchSelections[side] = id;
            if (matchSelections.left !== null && matchSelections.right !== null) checkMatchPair();
        }

        function checkMatchPair() {
            const left = document.querySelector(`.match-item[data-side="left"][data-id="${matchSelections.left}"]`);
            const right = document.querySelector(`.match-item[data-side="right"][data-id="${matchSelections.right}"]`);
            if (matchSelections.left === matchSelections.right) {
                matchedPairs.push(matchSelections.left);
                left.classList.remove('selected'); left.classList.add('matched');
                right.classList.remove('selected'); right.classList.add('matched');
            } else {
                left.classList.add('wrong'); right.classList.add('wrong');
                setTimeout(() => { left.classList.remove('selected', 'wrong'); right.classList.remove('selected', 'wrong'); }, 500);
            }
            matchSelections = { left: null, right: null };
        }

        // ==================== VERIFICAÇÃO ====================
        function checkAnswer() {
            const stage = currentStage.data;
            const feedback = document.getElementById('feedback');
            gameState.currentAttempts++;
            document.querySelector('.attempt-counter').textContent = `Tentativas: ${gameState.currentAttempts}`;
            
            let correct = false;
            const isDark = stage.zone === 'dark';

            if (stage.type === 'multiple') {
                if (selectedOption === null) { alert('Selecione uma opção!'); return; }
                correct = selectedOption === stage.correct;
                if (!correct) {
                    document.getElementById(`option${selectedOption}`).classList.add('incorrect');
                    const hint = isDark || !stage.hints.length ? "Incorreto." : stage.hints[Math.min(gameState.currentAttempts - 1, stage.hints.length - 1)];
                    feedback.innerHTML = `❌ ${hint}`;
                    feedback.className = 'feedback show incorrect';
                    setTimeout(() => { document.querySelectorAll('.option').forEach(e => e.classList.remove('incorrect', 'selected')); selectedOption = null; }, 1200);
                    gameState.totalErrors++; saveProgress(); renderMap();
                    return;
                }
                document.getElementById(`option${selectedOption}`).classList.add('correct');
            } else if (stage.type === 'fill') {
                const answers = stage.blanks.map((_, i) => document.getElementById(`blank${i}`).value);
                const results = stage.validate(answers);
                correct = results.every(r => r.correct);
                results.forEach((r, i) => {
                    const input = document.getElementById(`blank${i}`);
                    input.classList.remove('correct', 'incorrect');
                    input.classList.add(r.correct ? 'correct' : 'incorrect');
                });
                if (!correct) {
                    const firstErr = results.find(r => !r.correct);
                    feedback.innerHTML = `❌ ${isDark ? 'Incorreto.' : firstErr.hint}`;
                    feedback.className = 'feedback show incorrect';
                    gameState.totalErrors++; saveProgress(); renderMap();
                    return;
                }
            } else if (stage.type === 'drag') {
                const items = [...document.querySelectorAll('.drag-item')];
                const order = items.map(e => parseInt(e.dataset.correct));
                const expected = Array.from({length: items.length}, (_, i) => i);
                correct = JSON.stringify(order) === JSON.stringify(expected);
                if (!correct) {
                    const hint = isDark || !stage.hints.length ? "Incorreto." : stage.hints[Math.min(gameState.currentAttempts - 1, stage.hints.length - 1)];
                    feedback.innerHTML = `❌ ${hint}`;
                    feedback.className = 'feedback show incorrect';
                    gameState.totalErrors++; saveProgress(); renderMap();
                    return;
                }
            } else if (stage.type === 'match') {
                correct = matchedPairs.length === stage.pairs.length;
                if (!correct) {
                    feedback.innerHTML = `❌ Faltam ${stage.pairs.length - matchedPairs.length} par(es).`;
                    feedback.className = 'feedback show incorrect';
                    return;
                }
            }

            // Acertou!
            feedback.innerHTML = `✅ ${stage.successMessage}`;
            feedback.className = 'feedback show correct';
            if (!gameState.completedStages.includes(currentStage.index)) {
                gameState.completedStages.push(currentStage.index);
                saveProgress();
            }
            document.getElementById('checkBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'inline-flex';
            document.querySelectorAll('.option, .match-item, .drag-item').forEach(e => e.style.pointerEvents = 'none');
            document.querySelectorAll('input').forEach(e => e.disabled = true);
        }

        function goNext() {
            const worldData = getCurrentWorldData();
            const totalStages = worldData.stages.length;
            const lightCount = worldData.stages.filter(s => s.zone === 'light').length;
            const nextIndex = currentStage.index + 1;
            
            // Última casa → Boss
            if (nextIndex === totalStages) {
                closeModal();
                openBoss();
                return;
            }
            
            // Entrando no Dark Side
            if (nextIndex === lightCount) {
                closeModal();
                showDarkTransition(() => openStage(nextIndex));
                return;
            }
            
            // Transição normal
            if (nextIndex < totalStages) {
                const stage = worldData.stages[nextIndex];
                currentStage = { index: nextIndex, data: stage };
                gameState.currentAttempts = 0;
                selectedOption = null;
                matchSelections = { left: null, right: null };
                matchedPairs = [];
                document.getElementById('modalContent').className = `modal-content ${stage.zone === 'dark' ? 'dark-mode' : ''}`;
                renderStage(stage, nextIndex);
            } else {
                closeModal();
            }
        }

            showBossTransition(() => {

                const bossProva = worldData.bossProva || 10;
                const bossAprova = worldData.bossAprova || 7;
                const shuffled = [...worldData.bossQuestions];
                for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
                bossState = {
                    questions: shuffled.slice(0, bossProva),
                    currentIndex: 0, answers: [], score: 0,
                    bossProva, bossAprova,
                    worldLetter: worldData.letter,
                    worldTitle: worldData.title
                };
                document.getElementById('modalContent').className = 'modal-content dark-mode';
                renderBossQuestion();
                document.getElementById('gameModal').classList.add('show');
            });
        }

        function renderBossQuestion() {
            const q = bossState.questions[bossState.currentIndex];
            const num = bossState.currentIndex + 1;
            
            const bossProva = bossState.bossProva || 10;
            const bossAprova = bossState.bossAprova || 7;
            const worldLetter = bossState.worldLetter || 'A';
            let html = `<div class="boss-banner">
                <h2>👑 SIMULADO BOSS</h2>
                <p>Acerte ${bossAprova} de ${bossProva} para conquistar a letra "${worldLetter}"</p>

                    <span>${num}/${bossProva}</span>
                    <div class="boss-progress-bar"><div class="boss-progress-fill" style="width:${(num/bossProva)*100}%"></div></div>

            <div class="question-area">
                ${q.code ? `<div class="question-code">${q.code}</div>` : ''}
                <div class="question-text">${q.question}</div>
                <div class="options">`;
            
            q.options.forEach((opt, i) => {
                html += `<div class="option" onclick="selectBossOption(${i})" id="bossOpt${i}">
                    <span class="option-letter">${String.fromCharCode(65 + i)}</span>
                    <span>${opt}</span>

            html += `</div>

                    <button class="btn btn-danger" onclick="submitBossAnswer()">${num === bossProva ? '🏁 Finalizar' : 'Próxima →'}</button>

            document.getElementById('modalSubtitle').textContent = 'Simulado Final';
            document.getElementById('modalBody').innerHTML = html;
            selectedOption = null;
        }

        function selectBossOption(i) {
            selectedOption = i;
            document.querySelectorAll('.option').forEach((el, idx) => el.classList.toggle('selected', idx === i));
        }

        function submitBossAnswer() {
            if (selectedOption === null) { alert('Selecione!'); return; }
            const q = bossState.questions[bossState.currentIndex];
            bossState.answers.push({ question: q, selected: selectedOption, correct: selectedOption === q.correct });
            if (selectedOption === q.correct) bossState.score++;
            bossState.currentIndex++;
            bossState.currentIndex < bossState.bossProva ? renderBossQuestion() : showBossResults();
        }

        function showBossResults() {
            const bossProva = bossState.bossProva || 10;
            const bossAprova = bossState.bossAprova || 7;
            const worldLetter = bossState.worldLetter || 'A';
            const worldTitle = bossState.worldTitle || '';
            const passed = bossState.score >= bossAprova;
            let html = `<div class="results-card">
                <h2>${passed ? '🎉 PARABÉNS!' : '😔 Quase lá...'}</h2>
                <div class="results-score ${passed ? 'pass' : 'fail'}">${bossState.score}/${bossProva}</div>
                <p>${passed ? `Você conquistou a letra "${worldLetter}"!` : `Precisa de ${bossAprova}. Conseguiu ${bossState.score}.`}</p>
                <div class="results-details"><h4>📋 Revisão:</h4>`;
            
            bossState.answers.forEach((a, i) => {
                html += `<div class="result-item ${a.correct ? 'correct' : 'incorrect'}">
                    <strong>${a.correct ? '✅' : '❌'} Q${i + 1}</strong>
                    ${!a.correct ? `<div class="explanation">Resposta: ${a.question.options[a.question.correct]}<br>${a.question.explanation}</div>` : ''}
                </div>`;
            });
            
            html += `</div>

                    ${passed ? `<button class="btn btn-success" onclick="completeBoss()">🎉 Celebrar!</button>` : `<button class="btn btn-primary" onclick="openBoss()">🔄 Tentar novamente</button>`}
                    <button class="btn btn-secondary" onclick="closeModal()">↩️ Voltar</button>
                </div>
            </div>`;
            
            document.getElementById('modalTitle').textContent = passed ? '🏆 Vitória!' : '📊 Resultado';
            document.getElementById('modalSubtitle').textContent = `${bossState.score}/${bossProva} acertos`;
            document.getElementById('modalBody').innerHTML = html;
        }
